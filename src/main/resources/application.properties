spring.application.name=alert

# monitoring
monitoring.cycle=60000
monitoring.exclude.symbol=ABC,BBC

# Minervini / SEPA style breakout strategy
monitoring.strategy.kline.interval=1h
monitoring.strategy.kline.limit=80
monitoring.strategy.track.hours=48

monitoring.strategy.ma.short=10
monitoring.strategy.ma.middle=20
monitoring.strategy.ma.long=50

monitoring.strategy.breakout.lookback=20
monitoring.strategy.base.lookback=10
monitoring.strategy.volume.lookback=20

monitoring.strategy.breakout.volume.multiplier=1.6
monitoring.strategy.volume.dry.factor=0.7
monitoring.strategy.max.base.depth=0.18
monitoring.strategy.stop.buffer=0.01
monitoring.strategy.max.risk=0.08
monitoring.strategy.min.close.position.in.bar=0.65
