spring.application.name=alert
# monitoring ms
monitoring.cycle=60000
# kline interval
monitoring.kline.interval=1s,3s
# exclude symbol
monitoring.exclude.symbol=ABC,BBC
# volume usdt low
monitoring.alert.volume.low=200000
# volume usdt high
monitoring.alert.volume.high=4000000
# rate low 0.9%
monitoring.rate.low=0.009

monitoring.rate.back.low=0.03

monitoring.alert.volume.back.low=1000000
# rate high 10%
monitoring.rate.high=0.1


# new
monitoring.rate.two.low=0.01
monitoring.volume.two.low=1000000

# market data mode: rest, ws, hybrid
market.data.mode=hybrid
market.ws.base-url=wss://fstream.binance.com
market.ws.interval=1m
market.ws.batch-size=100
market.ws.cache-size=10
market.ws.ping-interval-seconds=20
market.ws.health-check-ms=30000
market.ws.stale-threshold-ms=120000

monitoring.proxy.enabled=true
monitoring.proxy.host=127.0.0.1
monitoring.proxy.port=7890

notification.feishu.webhook-url=https://open.feishu.cn/open-apis/bot/v2/hook/46451b2b-7e80-42ac-a32b-dae175ea4458
