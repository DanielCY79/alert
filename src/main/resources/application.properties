spring.application.name=alert
spring.config.import=optional:file:./local.properties

# Monitoring cycle in milliseconds.
monitoring.cycle=60000

# Reserved kline intervals.
monitoring.kline.interval=1s,3s

# Manually excluded symbols.
monitoring.exclude.symbol=ABC,BBC

# Type 1 low-volume multi-timeframe MA20 two-of-three rule.
monitoring.type1.average-volume-5d.max=300000000
monitoring.type1.one-minute-volume.min=80000
monitoring.type1.one-minute-amplitude.min=0.01
monitoring.type1.one-minute-amplitude.max=0.50

# Type 2 independent low-volume multi-timeframe MA20 rule.
monitoring.type2.average-volume-7d.max=500000000
monitoring.type2.one-minute-volume.min=200000
monitoring.type2.previous-one-minute-volume.min=40000
monitoring.type2.one-minute-amplitude.min=0.01
monitoring.type2.one-minute-amplitude.max=0.50

# Market data mode: rest, ws, or hybrid.
market.data.mode=hybrid
market.ws.base-url=wss://fstream.binance.com
market.ws.interval=1m
market.ws.batch-size=100
market.ws.cache-size=10
market.ws.ping-interval-seconds=20
market.ws.health-check-ms=30000
market.ws.stale-threshold-ms=120000

# HTTP and WebSocket proxy.
monitoring.proxy.enabled=true
monitoring.proxy.host=127.0.0.1
monitoring.proxy.port=7897

# Feishu bot webhook.
notification.feishu.webhook-url=

# Composite market sentiment enrichment for triggered alert cards.
market.sentiment.enabled=true
market.sentiment.cache-ms=300000
market.sentiment.cleanup-ms=300000
market.sentiment.cryptopanic-api-key=
market.sentiment.cryptopanic-pages=3
market.sentiment.min-mentions=2
market.sentiment.cryptopanic-weight=0.45
market.sentiment.gainers-weight=0.25
market.sentiment.coingecko-weight=0.15
market.sentiment.fear-greed-weight=0.15
market.sentiment.binance-min-24h-volume-usdt=50000000
